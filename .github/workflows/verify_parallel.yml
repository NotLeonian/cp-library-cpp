name: verify-parallel

on: workflow_dispatch

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    # ! dependents on other library
    - name: Update Submodules
      run: git submodule update --remote

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install "setuptools<82" "online-judge-verify-helper==5.6.0"

    - name: Run tests
      env:
        YUKICODER_TOKEN: ${{ secrets.YUKICODER_TOKEN }}
        VERIFY_JOBS: 4
        VERIFY_BUCKET_SIZE: 20
        VERIFY_TIMEOUT: 6000
        VERIFY_TLE: 60
        OJ_TEST_JOBS: 1
      run: python scripts/verify.py

    - name: Commit verification timestamp
      if: github.ref_type == 'branch'
      run: |
        git config --global user.name "GitHub"
        git config --global user.email "noreply@github.com"

        git add .verify-helper/timestamps.remote.json

        if ! git diff --quiet --staged; then
          git commit -m "[auto-verifier] verify commit ${GITHUB_SHA}"
          git pull --rebase
          git push
        fi