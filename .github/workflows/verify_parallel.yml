name: verify-parallel

on:
  workflow_dispatch:
    inputs:
      deploy_docs:
        description: Deploy generated docs to GitHub Pages
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true
        fetch-depth: 0
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    # ! dependents on other library
    - name: Update Submodules
      run: git submodule update --remote

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install "setuptools<82" "online-judge-verify-helper==5.6.0"

    - name: Run tests
      env:
        YUKICODER_TOKEN: ${{ secrets.YUKICODER_TOKEN }}
        VERIFY_JOBS: 4
        VERIFY_BUCKET_SIZE: 20
        VERIFY_TIMEOUT: 6000
        VERIFY_TLE: 60
        OJ_TEST_JOBS: 1
      run: python scripts/verify.py run

    - name: Generate GitHub App token
      if: success() && github.ref_type == 'branch'
      id: app-token
      uses: actions/create-github-app-token@v2
      with:
        app-id: ${{ vars.VERIFIER_APP_ID }}
        private-key: ${{ secrets.VERIFIER_APP_PRIVATE_KEY }}
        permission-contents: write

    - name: Commit verification timestamp
      if: success() && github.ref_type == 'branch'
      env:
        APP_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        git config user.name "cp-library-cpp-verifier[bot]"
        git config user.email "noreply@github.com"

        git add .verify-helper/timestamps.remote.json

        if git diff --quiet --staged; then
          echo "No timestamp changes"
          exit 0
        fi

        git commit -m "[auto-verifier] verify commit ${GITHUB_SHA}"
        git pull --rebase origin "${GITHUB_REF_NAME}"
        git push "https://x-access-token:${APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"

    - name: Deploy docs to gh-pages
      if: success() && github.ref_type == 'branch' && github.ref_name == github.event.repository.default_branch && inputs.deploy_docs
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GH_PAT: ${{ secrets.GH_PAT }}
        VERIFY_DOCS_JOBS: 4
        VERIFY_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      run: python scripts/verify.py docs
