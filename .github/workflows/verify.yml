name: verify

on:
  push:
    paths-ignore:
      - '.verify-helper/timestamps.remote.json'
  workflow_dispatch:
    inputs:
      full_verify:
        description: "Ignore .verify-helper/timestamps.remote.json and re-run all verification"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true
        fetch-depth: 0
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Check ac-library pin
      run: |
        test "$(git -C ac-library rev-parse HEAD)" = "864245a00b00dd008d1abfdc239618fdb7d139da"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install "setuptools<82" "online-judge-verify-helper==5.6.0"

    - name: Check documentation_of consistency
      run: |
        set -euo pipefail

        script="${RUNNER_TEMP}/check-documentation-of.py"

        {
          printf '%s\n' 'import pathlib'
          printf '%s\n' 'import sys'
          printf '%s\n' ''
          printf '%s\n' 'from onlinejudge_verify.documentation import configure'
          printf '%s\n' 'from onlinejudge_verify.documentation import front_matter as oj_front_matter'
          printf '%s\n' 'from onlinejudge_verify.documentation import main as doc_main'
          printf '%s\n' 'from onlinejudge_verify.languages import list as language_list'
          printf '%s\n' ''
          printf '%s\n' 'DOCUMENTATION_OF = "documentation_of"'
          printf '%s\n' ''
          printf '%s\n' 'basedir = pathlib.Path.cwd().resolve()'
          printf '%s\n' 'config = doc_main.load_render_config(basedir=basedir)'
          printf '%s\n' 'excluded_paths = ['
          printf '%s\n' '    pathlib.Path(p)'
          printf '%s\n' '    for p in config.config_yml.get("exclude", [])'
          printf '%s\n' ']'
          printf '%s\n' ''
          printf '%s\n' 'bad = []'
          printf '%s\n' 'checked_markdown = 0'
          printf '%s\n' 'checked_documentation_of = 0'
          printf '%s\n' ''
          printf '%s\n' 'for md in sorted(configure.find_markdown_paths(basedir=basedir), key=lambda p: str(p)):'
          printf '%s\n' '    md_abs = md.resolve()'
          printf '%s\n' '    rel_md = md_abs.relative_to(basedir)'
          printf '%s\n' ''
          printf '%s\n' '    checked_markdown += 1'
          printf '%s\n' ''
          printf '%s\n' '    front_matter, _ = oj_front_matter.split_front_matter(md_abs.read_bytes())'
          printf '%s\n' '    documentation_of = front_matter.get(DOCUMENTATION_OF)'
          printf '%s\n' ''
          printf '%s\n' '    if documentation_of is None:'
          printf '%s\n' '        continue'
          printf '%s\n' ''
          printf '%s\n' '    checked_documentation_of += 1'
          printf '%s\n' ''
          printf '%s\n' '    if not isinstance(documentation_of, str):'
          printf '%s\n' '        bad.append((rel_md, documentation_of, "documentation_of must be a string"))'
          printf '%s\n' '        continue'
          printf '%s\n' ''
          printf '%s\n' '    src = configure.resolve_documentation_of('
          printf '%s\n' '        documentation_of,'
          printf '%s\n' '        markdown_path=rel_md,'
          printf '%s\n' '        basedir=basedir,'
          printf '%s\n' '    )'
          printf '%s\n' ''
          printf '%s\n' '    if src is None:'
          printf '%s\n' '        bad.append((rel_md, documentation_of, "source file is not found"))'
          printf '%s\n' '        continue'
          printf '%s\n' ''
          printf '%s\n' '    rel_src = src.resolve().relative_to(basedir)'
          printf '%s\n' ''
          printf '%s\n' '    if configure.is_excluded(rel_src, excluded_paths=excluded_paths):'
          printf '%s\n' '        bad.append((rel_md, documentation_of, f"points to excluded source: {rel_src}"))'
          printf '%s\n' '        continue'
          printf '%s\n' ''
          printf '%s\n' '    if language_list.get(rel_src) is None:'
          printf '%s\n' '        bad.append(('
          printf '%s\n' '            rel_md,'
          printf '%s\n' '            documentation_of,'
          printf '%s\n' '            f"points to a file that oj-verify docs does not treat as source code: {rel_src}",'
          printf '%s\n' '        ))'
          printf '%s\n' '        continue'
          printf '%s\n' ''
          printf '%s\n' 'print(f"checked markdown files: {checked_markdown}")'
          printf '%s\n' 'print(f"checked documentation_of entries: {checked_documentation_of}")'
          printf '%s\n' 'if excluded_paths:'
          printf '%s\n' '    print("exclude entries: " + ", ".join(map(str, excluded_paths)))'
          printf '%s\n' ''
          printf '%s\n' 'for md, documentation_of, reason in bad:'
          printf '%s\n' '    print(f"{md}: documentation_of={documentation_of!r}: {reason}")'
          printf '%s\n' ''
          printf '%s\n' 'if bad:'
          printf '%s\n' '    sys.exit(1)'
        } > "${script}"

        python3 "${script}"

    - name: Patch verification-helper for AtCoder sample-only verification
      run: |
        python <<'PY'
        import pathlib
        import onlinejudge_verify.verify

        path = pathlib.Path(onlinejudge_verify.verify.__file__)
        text = path.read_text()

        old = "        command = ['oj', 'download', '--system', '-d', str(directory / 'test'), '--silent', url]\n"
        new = (
            "        command = ['oj', 'download', '-d', str(directory / 'test'), '--silent', url]\n"
            "        if not isinstance(problem, onlinejudge.service.atcoder.AtCoderProblem):\n"
            "            command.insert(2, '--system')\n"
        )

        if old not in text:
            raise RuntimeError(f"patch target not found: {path}")

        path.write_text(text.replace(old, new))
        print(f"patched {path}: AtCoder uses sample cases, others keep --system")
        PY

    - name: Disable oj-verify timestamp cache for full verification
      if: ${{ github.event_name == 'workflow_dispatch' && inputs.full_verify }}
      run: |
        rm -f .verify-helper/timestamps.remote.json
        rm -rf .verify-helper/cache

    - name: Run tests
      env:
        YUKICODER_TOKEN: ${{ secrets.YUKICODER_TOKEN }}
      run: oj-verify run --timeout 6000

    - name: Normalize verification timestamp
      run: python scripts/verify.py normalize-timestamps

    - name: Generate GitHub App token
      if: success() && github.ref == 'refs/heads/main'
      id: app-token
      uses: actions/create-github-app-token@v2
      with:
        app-id: ${{ vars.VERIFIER_APP_ID }}
        private-key: ${{ secrets.VERIFIER_APP_PRIVATE_KEY }}
        permission-contents: write

    - name: Commit verification timestamp
      if: success() && github.ref == 'refs/heads/main'
      env:
        APP_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        git config user.name "cp-library-cpp-verifier[bot]"
        git config user.email "noreply@github.com"

        git add .verify-helper/timestamps.remote.json

        if git diff --quiet --staged; then
          echo "No timestamp changes"
          exit 0
        fi

        git commit -m "[auto-verifier] verify commit ${GITHUB_SHA}"
        git pull --rebase origin main
        git push "https://x-access-token:${APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main

    - name: Deploy docs to gh-pages
      if: success() && github.ref == 'refs/heads/main'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GH_PAT: ${{ secrets.GH_PAT }}
      shell: bash
      run: |
        set -euo pipefail

        wrapper_dir="${RUNNER_TEMP}/bin-for-oj-bundle"
        wrapper_basename="g++"
        wrapper="${wrapper_dir}/${wrapper_basename}"
        real_gxx="$(command -v g++)"

        mkdir -p "${wrapper_dir}"

        {
          printf '%s\n' '#!/usr/bin/env bash'
          printf '%s\n' 'set -euo pipefail'
          printf '%s\n' ''
          printf '%s\n' 'if [[ -z "${REAL_GXX:-}" ]]; then'
          printf '%s\n' '  echo "REAL_GXX is not set" >&2'
          printf '%s\n' '  exit 127'
          printf '%s\n' 'fi'
          printf '%s\n' ''
          printf '%s\n' 'has_fpreprocessed=0'
          printf '%s\n' 'has_dD=0'
          printf '%s\n' 'has_E=0'
          printf '%s\n' ''
          printf '%s\n' 'for arg in "$@"; do'
          printf '%s\n' '  case "$arg" in'
          printf '%s\n' '    -fpreprocessed) has_fpreprocessed=1 ;;'
          printf '%s\n' '    -dD) has_dD=1 ;;'
          printf '%s\n' '    -E) has_E=1 ;;'
          printf '%s\n' '  esac'
          printf '%s\n' 'done'
          printf '%s\n' ''
          printf '%s\n' 'if [[ "${has_fpreprocessed}${has_dD}${has_E}" == "111" ]]; then'
          printf '%s\n' '  exec "${REAL_GXX}" -w "$@"'
          printf '%s\n' 'else'
          printf '%s\n' '  exec "${REAL_GXX}" "$@"'
          printf '%s\n' 'fi'
        } > "${wrapper}"

        chmod +x "${wrapper}"

        patch_dir="${RUNNER_TEMP}/oj-verify-docs-exclude-patch"
        patch_basename="sitecustomize.py"
        patch="${patch_dir}/${patch_basename}"

        mkdir -p "${patch_dir}"

        {
          printf '%s\n' 'import pathlib'
          printf '%s\n' ''
          printf '%s\n' 'from onlinejudge_verify.documentation import configure as _cfg'
          printf '%s\n' ''
          printf '%s\n' '_orig_find_source_code_paths = _cfg._find_source_code_paths'
          printf '%s\n' ''
          printf '%s\n' ''
          printf '%s\n' 'def _to_relative(path, *, basedir):'
          printf '%s\n' '    path = pathlib.Path(path)'
          printf '%s\n' '    try:'
          printf '%s\n' '        return path.resolve().relative_to(basedir.resolve())'
          printf '%s\n' '    except Exception:'
          printf '%s\n' '        return path'
          printf '%s\n' ''
          printf '%s\n' ''
          printf '%s\n' 'def _find_source_code_paths(*, basedir):'
          printf '%s\n' '    paths = _orig_find_source_code_paths(basedir=basedir)'
          printf '%s\n' ''
          printf '%s\n' '    try:'
          printf '%s\n' '        from onlinejudge_verify.documentation import main as _doc_main'
          printf '%s\n' ''
          printf '%s\n' '        site_config = _doc_main.load_render_config(basedir=basedir)'
          printf '%s\n' '        excluded_paths = ['
          printf '%s\n' '            pathlib.Path(p)'
          printf '%s\n' '            for p in site_config.config_yml.get("exclude", [])'
          printf '%s\n' '        ]'
          printf '%s\n' ''
          printf '%s\n' '        return ['
          printf '%s\n' '            path'
          printf '%s\n' '            for path in paths'
          printf '%s\n' '            if not _cfg.is_excluded('
          printf '%s\n' '                _to_relative(path, basedir=basedir),'
          printf '%s\n' '                excluded_paths=excluded_paths,'
          printf '%s\n' '            )'
          printf '%s\n' '        ]'
          printf '%s\n' '    except Exception:'
          printf '%s\n' '        return paths'
          printf '%s\n' ''
          printf '%s\n' ''
          printf '%s\n' '_cfg._find_source_code_paths = _find_source_code_paths'
        } > "${patch}"

        python3 -m py_compile "${patch}"
        export PYTHONPATH="${patch_dir}${PYTHONPATH:+:${PYTHONPATH}}"

        PATH="${wrapper_dir}:${PATH}" REAL_GXX="${real_gxx}" CXX="${wrapper}" oj-verify docs
