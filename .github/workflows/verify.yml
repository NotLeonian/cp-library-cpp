name: verify

on:
  push:
    paths-ignore:
      - '.verify-helper/timestamps.remote.json'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true
        fetch-depth: 0
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    # ! dependents on other library
    - name: Update Submodules
      run: git submodule update --remote

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install "setuptools<82" "online-judge-verify-helper==5.6.0"

    - name: Patch verification-helper for AtCoder sample-only verification
      run: |
        python <<'PY'
        import pathlib
        import onlinejudge_verify.verify

        path = pathlib.Path(onlinejudge_verify.verify.__file__)
        text = path.read_text()

        old = "        command = ['oj', 'download', '--system', '-d', str(directory / 'test'), '--silent', url]\n"
        new = (
            "        command = ['oj', 'download', '-d', str(directory / 'test'), '--silent', url]\n"
            "        if not isinstance(problem, onlinejudge.service.atcoder.AtCoderProblem):\n"
            "            command.insert(2, '--system')\n"
        )

        if old not in text:
            raise RuntimeError(f"patch target not found: {path}")

        path.write_text(text.replace(old, new))
        print(f"patched {path}: AtCoder uses sample cases, others keep --system")
        PY

    - name: Run tests
      env:
        YUKICODER_TOKEN: ${{ secrets.YUKICODER_TOKEN }}
      run: oj-verify run --timeout 6000

    - name: Generate GitHub App token
      if: success() && github.ref == 'refs/heads/main'
      id: app-token
      uses: actions/create-github-app-token@v2
      with:
        app-id: ${{ vars.VERIFIER_APP_ID }}
        private-key: ${{ secrets.VERIFIER_APP_PRIVATE_KEY }}
        permission-contents: write

    - name: Commit verification timestamp
      if: success() && github.ref == 'refs/heads/main'
      env:
        APP_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        git config user.name "cp-library-cpp-verifier[bot]"
        git config user.email "noreply@github.com"

        git add .verify-helper/timestamps.remote.json

        if git diff --quiet --staged; then
          echo "No timestamp changes"
          exit 0
        fi

        git commit -m "[auto-verifier] verify commit ${GITHUB_SHA}"
        git pull --rebase origin main
        git push "https://x-access-token:${APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main

    - name: Deploy docs to gh-pages
      if: success() && github.ref == 'refs/heads/main'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GH_PAT: ${{ secrets.GH_PAT }}
      run: oj-verify docs
